x-ingestion-base: &ingestion-base
  build:
    context: ../../services/cerebro-rag-worker
    dockerfile: Dockerfile
  restart: on-failure
  user: "1000:1000"
  environment:
    SOURCE_DATABASE_URL: ${SOURCE_DATABASE_URL}
    RAG_DATABASE_URL: ${RAG_DATABASE_URL}
    INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    LIBRARY_ROOT: /library
    PAGE_CACHE_ROOT: /page-cache
    EMBEDDING_MODEL: BAAI/bge-m3
    BATCH_SIZE: "32"
    REMOTE_EMBEDDING_URLS: ${REMOTE_EMBEDDING_URLS:-}
    REMOTE_EMBEDDING_SECRET: ${INTERNAL_API_SECRET}
    REMOTE_EMBEDDING_TIMEOUT_SECONDS: "45"
    HF_HOME: /model-cache
    OMP_NUM_THREADS: "3"
    MKL_NUM_THREADS: "3"
  volumes:
    - /mnt/data2:/library:ro
    - /var/lib/maccell/rag-pages:/page-cache
    - /var/lib/maccell/rag-models:/model-cache
  networks:
    - dokploy-network
  deploy:
    resources:
      limits:
        cpus: "3"
        memory: 12G
      reservations:
        cpus: "1"
        memory: 2G

services:
  worker:
    build:
      context: ../../services/cerebro-rag-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "1000:1000"
    command: ["sh", "-lc", "cerebro-rag migrate && cerebro-rag catalog-aliases && exec uvicorn cerebro_rag.server:app --host 0.0.0.0 --port 8080"]
    environment:
      SOURCE_DATABASE_URL: ${SOURCE_DATABASE_URL}
      RAG_DATABASE_URL: ${RAG_DATABASE_URL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      LIBRARY_ROOT: /library
      PAGE_CACHE_ROOT: /page-cache
      EMBEDDING_MODEL: BAAI/bge-m3
      BATCH_SIZE: "32"
      REMOTE_EMBEDDING_URLS: ${REMOTE_EMBEDDING_URLS:-}
      REMOTE_EMBEDDING_SECRET: ${INTERNAL_API_SECRET}
      REMOTE_EMBEDDING_TIMEOUT_SECONDS: "45"
      HF_HOME: /model-cache
      OMP_NUM_THREADS: "12"
      MKL_NUM_THREADS: "12"
    volumes:
      - /mnt/data2:/library:ro
      - /var/lib/maccell/rag-pages:/page-cache
      - /var/lib/maccell/rag-models:/model-cache
    networks:
      dokploy-network:
        aliases:
          - maccell-rag-worker
    deploy:
      resources:
        limits:
          cpus: "12"
          memory: 32G
        reservations:
          cpus: "2"
          memory: 4G

  ingestion-0:
    <<: *ingestion-base
    command: ["sh", "-lc", "cerebro-rag migrate && cerebro-rag index-pdfs --shard-count 9 --shard-index 0"]

  ingestion-1:
    <<: *ingestion-base
    command: ["sh", "-lc", "cerebro-rag migrate && cerebro-rag index-pdfs --shard-count 9 --shard-index 1"]

  ingestion-2:
    <<: *ingestion-base
    command: ["sh", "-lc", "cerebro-rag migrate && cerebro-rag index-pdfs --shard-count 9 --shard-index 2"]

  ingestion-3:
    <<: *ingestion-base
    command: ["sh", "-lc", "cerebro-rag migrate && cerebro-rag index-pdfs --shard-count 9 --shard-index 3"]

  ingestion-4:
    <<: *ingestion-base
    command: ["sh", "-lc", "cerebro-rag migrate && cerebro-rag index-pdfs --shard-count 9 --shard-index 4"]

  ingestion-5:
    <<: *ingestion-base
    command: ["sh", "-lc", "cerebro-rag migrate && cerebro-rag index-pdfs --shard-count 9 --shard-index 5"]

  ingestion-6:
    <<: *ingestion-base
    command: ["sh", "-lc", "cerebro-rag migrate && cerebro-rag index-pdfs --shard-count 9 --shard-index 6"]

  ingestion-7:
    <<: *ingestion-base
    command: ["sh", "-lc", "cerebro-rag migrate && cerebro-rag index-pdfs --shard-count 9 --shard-index 7"]

  ingestion-8:
    <<: *ingestion-base
    command: ["sh", "-lc", "cerebro-rag migrate && cerebro-rag index-pdfs --shard-count 9 --shard-index 8"]

  repair-sync:
    build:
      context: ../../services/cerebro-rag-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "1000:1000"
    command: ["sh", "-lc", "cerebro-rag migrate && cerebro-rag sync-repairs --interval 300"]
    environment:
      SOURCE_DATABASE_URL: ${SOURCE_DATABASE_URL}
      RAG_DATABASE_URL: ${RAG_DATABASE_URL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      LIBRARY_ROOT: /library
      PAGE_CACHE_ROOT: /page-cache
      EMBEDDING_MODEL: BAAI/bge-m3
      BATCH_SIZE: "32"
      REMOTE_EMBEDDING_URLS: ${REMOTE_EMBEDDING_URLS:-}
      REMOTE_EMBEDDING_SECRET: ${INTERNAL_API_SECRET}
      REMOTE_EMBEDDING_TIMEOUT_SECONDS: "45"
      HF_HOME: /model-cache
      OMP_NUM_THREADS: "4"
      MKL_NUM_THREADS: "4"
    volumes:
      - /mnt/data2:/library:ro
      - /var/lib/maccell/rag-pages:/page-cache
      - /var/lib/maccell/rag-models:/model-cache
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 12G
        reservations:
          cpus: "1"
          memory: 2G

networks:
  dokploy-network:
    external: true
